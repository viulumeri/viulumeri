name: Test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript healthcheck
        run: npm run healthcheck

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Start MongoDB with docker-compose
        run: docker compose up -d

      - name: Wait for MongoDB to be ready
        run: |
          until docker compose exec -T mongodb mongosh --eval "db.adminCommand('ping')" >/dev/null 2>&1; do
            echo "Waiting for MongoDB..."
            sleep 2
          done

      - name: Install dependencies
        run: npm ci

      - name: Copy environment file
        run: cp server/.env-example server/.env

      - name: Create test audio directory
        run: mkdir -p /tmp/test-audio

      - name: Run tests
        env:
          BETTER_AUTH_SECRET: test-secret-key-for-github-actions
          MUSIC_DIR: /tmp/test-audio
        run: npm test --workspace=server

      - name: Stop MongoDB
        if: always()
        run: docker compose down

  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install e2e dependencies
        run: npm ci
        working-directory: e2e

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Build and start app with Docker Compose
        run: docker compose -f docker-compose.e2e.yml up --build -d

      - name: Wait for app to be ready
        run: |
          echo "Waiting for app to be ready..."
          for i in $(seq 1 12); do
            if curl -sf http://localhost:3001/ping; then
              echo "App is ready."
              exit 0
            fi
            echo "Attempt $i/12 failed, retrying in 5s..."
            sleep 5
          done
          echo "App did not become ready in time."
          docker compose -f docker-compose.e2e.yml logs app
          exit 1

      - name: Run E2E tests
        run: npm test
        working-directory: e2e
        env:
          E2E_MONGODB_URI: mongodb://admin:password@localhost:27018/viulumeri?authSource=admin

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      - name: Stop services
        if: always()
        run: docker compose -f docker-compose.e2e.yml down

